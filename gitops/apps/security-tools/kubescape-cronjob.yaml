apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape
  namespace: security-audit
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: kubescape
        spec:
          containers:
          - name: kubescape
            image: quay.io/kubescape/kubescape:latest
            command: 
            - "kubescape"
            - "scan"
            - "framework"
            - "nsa"
            # Le decimos a Kubescape que use la carpeta temporal para sus datos
            env:
            - name: KUBESCAPE_HOME
              value: /tmp/.kubescape
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 10001
              capabilities:
                drop:
                  - ALL
            volumeMounts:
            - name: cache-volume
              mountPath: /tmp
          restartPolicy: OnFailure
          # Creamos el volumen temporal en memoria RAM
          volumes:
          - name: cache-volume
            emptyDir: {}