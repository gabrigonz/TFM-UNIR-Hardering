apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubescape-sa
  namespace: security-audit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubescape-readonly-role
rules:
- apiGroups: [""]
  resources: ["pods", "namespaces", "nodes", "configmaps", "serviceaccounts"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io", "cilium.io"]
  resources: ["networkpolicies", "ciliumnetworkpolicies", "ciliumclusterwidenetworkpolicies"]
  verbs: ["get", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubescape-readonly-binding
subjects:
- kind: ServiceAccount
  name: kubescape-sa
  namespace: security-audit
roleRef:
  kind: ClusterRole
  name: kubescape-readonly-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape
  namespace: security-audit
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: kubescape
        spec:
          serviceAccountName: kubescape-sa
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: kubescape
            image: quay.io/kubescape/kubescape-cli:v4.0.5
            imagePullPolicy: IfNotPresent
            command: ["kubescape"]
            args:
            - "scan"
            - "framework"
            - "nsa"
            - "--format"
            - "json"
            - "--output"
            - "/tmp/results-nsa.json"
            env:
            - name: KUBESCAPE_HOME
              value: /tmp/.kubescape
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
            volumeMounts:
            - name: cache-volume
              mountPath: /tmp
          volumes:
          - name: cache-volume
            emptyDir: {}