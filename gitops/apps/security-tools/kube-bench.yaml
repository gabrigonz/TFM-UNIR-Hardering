apiVersion: batch/v1
kind: Job
metadata:
  name: kube-bench
  namespace: security-audit
spec:
  template:
    metadata:
      labels:
        app: kube-bench
    spec:
      hostPID: true  # Permite romper el aislamiento para inspeccionar procesos del host de AWS
      containers:
      - name: kube-bench
        image: aquasec/kube-bench:v0.6.15  
        command: ["kube-bench", "--benchmark", "eks-1.0"]  
        securityContext:
          allowPrivilegeEscalation: false  
          readOnlyRootFilesystem: true     
          runAsNonRoot: false              
          capabilities:
            drop:
              - ALL                       
        volumeMounts:
        - name: var-lib-kubelet
          mountPath: /var/lib/kubelet
          readOnly: true
        - name: etc-systemd
          mountPath: /etc/systemd
          readOnly: true
        - name: etc-kubernetes
          mountPath: /etc/kubernetes
          readOnly: true
      restartPolicy: Never
      volumes:
      - name: var-lib-kubelet
        hostPath:
          path: /var/lib/kubelet
      - name: etc-systemd
        hostPath:
          path: /etc/systemd
      - name: etc-kubernetes
        hostPath:
          path: /etc/kubernetes