apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kyverno.github.io/kyverno/'
    chart: kyverno
    targetRevision: 3.3.0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: security-audit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true