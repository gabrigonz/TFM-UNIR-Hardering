apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kyverno.github.io/kyverno/'
    chart: kyverno
    targetRevision: 3.3.0
    helm:
      parameters:
        - name: crds.migration.enabled
          value: 'false'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kyverno                   # Su propio namespace obligatorio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true             # Crea el namespace automáticamente
      - ServerSideApply=true